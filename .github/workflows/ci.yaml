name: CI

on:
  pull_request:
    branches:
    - '*'
  merge_group:
    types: [checks_requested]
  push:
    branches:
    - main

defaults:
  run:
    shell: bash

jobs:
  all:
    name: All

    strategy:
      matrix:
        os:
        - ubuntu-latest
        - macos-latest
        - windows-latest

    runs-on: ${{matrix.os}}

    env:
      RUSTFLAGS: --deny warnings
      # Insta: update snapshots instead of failing (for PR review)
      # Set to "no" for actual CI, developers can use "yes" locally
      INSTA_UPDATE: "no"

    steps:
    - uses: actions/checkout@v6

    - name: Install Rust Toolchain Components
      uses: dtolnay/rust-toolchain@stable

    - uses: Swatinem/rust-cache@v2

    - name: Install cargo-nextest
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-nextest

    # harnx's integration tests (tests/interrupt_e2e.rs, tests/tmux_e2e.rs)
    # spawn sibling bins (harnx-mcp-time, harnx-mcp-repro249) via a
    # sibling-path lookup in src/test_utils/interrupt.rs. Those bins live in
    # separate workspace crates that harnx doesn't depend on, so
    # `cargo nextest run --all` alone won't build them. Build the whole
    # workspace (bins + tests) first so every bin is present before tests
    # start.
    - name: Build workspace
      run: cargo build --workspace --all-targets

    - name: Test
      run: cargo nextest run --all

    - name: Check for pending snapshot updates
      if: failure()
      run: |
        if ls crates/harnx-tui/src/snapshots/*.snap.new 2>/dev/null; then
          echo "::error::Snapshot updates pending. Run 'cargo insta review' locally to review and accept changes."
          exit 1
        fi

    - name: Clippy
      run: cargo clippy --all --all-targets -- -D warnings

    - name: Format
      run: cargo fmt --all --check