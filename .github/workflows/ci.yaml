name: CI

on:
  pull_request:
    branches:
    - '*'
  merge_group:
    types: [checks_requested]
  push:
    branches:
    - main

defaults:
  run:
    shell: bash

jobs:
  all:
    name: All

    strategy:
      matrix:
        os:
        - ubuntu-latest
        - macos-latest
        - windows-latest

    runs-on: ${{matrix.os}}

    env:
      RUSTFLAGS: --deny warnings
      # Insta: update snapshots instead of failing (for PR review)
      # Set to "no" for actual CI, developers can use "yes" locally
      INSTA_UPDATE: "no"

    steps:
    - uses: actions/checkout@v6

    - name: Install Rust Toolchain Components
      uses: dtolnay/rust-toolchain@stable

    - uses: Swatinem/rust-cache@v2

    - name: Install cargo-nextest
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-nextest

    - name: Test
      run: cargo nextest run --all

    - name: Check for pending snapshot updates
      if: failure()
      run: |
        if ls src/tui/snapshots/*.snap.new 2>/dev/null; then
          echo "::error::Snapshot updates pending. Run 'cargo insta review' locally to review and accept changes."
          exit 1
        fi

    - name: Clippy
      run: cargo clippy --all --all-targets -- -D warnings

    - name: Format
      run: cargo fmt --all --check