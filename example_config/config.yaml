# ---- llm ----
model: openai:gpt-4o             # Specify the LLM to use
stream: true

# ---- behavior ----
save_session: true
keybindings: emacs

# ---- tool-use ----
tool_use: true
use_tools: '*'
toolsets:
  fs_read:
    - Read
    - ListDirectory
    - Grep
    - Glob
  fs_write:
    - Write
    - Edit

